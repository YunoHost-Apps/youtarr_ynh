#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "youtarr"
name = "Youtarr"
description.en = "Automatically download and organize YouTube channels and playlists for Plex, Jellyfin, Emby and Kodi"
description.fr = "Télécharge et organise automatiquement des chaînes et playlists YouTube pour Plex, Jellyfin, Emby et Kodi"

version = "1.72.1~ynh1"

maintainers = ["bowgartfield"]

[upstream]
license = "ISC"
website = "https://github.com/DialmasterOrg/Youtarr"
admindoc = "https://github.com/DialmasterOrg/Youtarr/tree/main/docs"
userdoc = "https://github.com/DialmasterOrg/Youtarr#readme"
code = "https://github.com/DialmasterOrg/Youtarr"
fund = "https://www.patreon.com/c/ChrisDial"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = true

ldap = false
sso = false

disk = "1G"
ram.build = "1024M"
ram.runtime = "512M"

[install]
    [install.domain]
    type = "domain"

    # No "path" question: Youtarr's client build references its static assets
    # with absolute root paths, so it only works installed at the root of a
    # (sub)domain. Omitting this question forces path="/" with no user choice.

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"
    help.en = "Youtarr has its own login system. This YunoHost user's name will be used to seed the initial admin account."
    help.fr = "Youtarr a son propre système de connexion. Le nom de cet utilisateur YunoHost sera utilisé pour créer le compte admin initial."

    [install.password]
    type = "password"
    help.en = "Initial password for the Youtarr admin account (8 to 64 characters)."
    help.fr = "Mot de passe initial du compte admin Youtarr (8 à 64 caractères)."

[resources]

    [resources.sources.main]
    url = "https://github.com/DialmasterOrg/Youtarr/archive/refs/tags/v1.72.1.tar.gz"
    sha256 = "5c51267135c01f2e13ce4cc5a81e28ddca0ef7da879068f2b960725f589be4f7"
    autoupdate.strategy = "latest_github_release"

    [resources.sources.yt-dlp]
    amd64.url = "https://github.com/yt-dlp/yt-dlp/releases/download/2026.06.09/yt-dlp_linux"
    amd64.sha256 = "bf8aac79b72287a6d2043074415132558b43743a8f9461a22b0141e90f16ce66"
    arm64.url = "https://github.com/yt-dlp/yt-dlp/releases/download/2026.06.09/yt-dlp_linux_aarch64"
    arm64.sha256 = "cabd246445bdfde0eda0dfe68bbe90354be83f3fdbbf077df11a2ea55f41cdbd"
    format = "whatever"
    extract = false
    rename = "yt-dlp"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "yt-dlp_linux"
    autoupdate.asset.arm64 = "yt-dlp_linux_aarch64"

    [resources.sources.deno]
    # yt-dlp needs a JS runtime on PATH to solve YouTube's "n" challenge,
    # otherwise most video formats silently disappear (only images left).
    amd64.url = "https://github.com/denoland/deno/releases/download/v2.9.1/deno-x86_64-unknown-linux-gnu.zip"
    amd64.sha256 = "710c54d63477d1100844ef4818f19507ce0dbf40510903b1d883f19e394446a2"
    arm64.url = "https://github.com/denoland/deno/releases/download/v2.9.1/deno-aarch64-unknown-linux-gnu.zip"
    arm64.sha256 = "0a60d079fa79635a59803074dbbfe86ccc35746dc2c4f8d73f2e50338b3283a9"
    in_subdir = false

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "deno-x86_64-unknown-linux-gnu.zip"
    autoupdate.asset.arm64 = "deno-aarch64-unknown-linux-gnu.zip"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 3011

    [resources.apt]
    packages = "ffmpeg, atomicparsley, python3, python3-venv"

    [resources.database]
    type = "mysql"

    [resources.nodejs]
    # Youtarr's package.json enforces engine-strict npm >=11.10.0 (bundled with
    # node 20/22's default npm is too old); node 24 ships a recent enough npm.
    version = "24"
